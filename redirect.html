<!DOCTYPE html>
<html>
<head>
    <title>Verifying...</title>
    <style>body { background: #0b0e11; color: white; font-family: 'Verdana', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }</style>
</head>
<body>
    <div id="status">CONNECTING TO BACKEND...</div>

    <script>
        const code = new URLSearchParams(window.location.search).get('code');
        const status = document.getElementById('status');

        if (code) {
            // FIXED: Ensure this URL is exactly your Render URL
            fetch('https://fancykarma-backend.onrender.com/verify-reddit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code })
            })
            .then(res => {
                if (!res.ok) throw new Error('Backend responded with error ' + res.status);
                return res.json();
            })
            .then(data => {
                if (data.eligible) {
                    status.innerHTML = `<h2 style="color:#00ff00">SUCCESS</h2>Welcome ${data.username}!<br>Karma: ${data.details.karma} | Age: ${data.details.age} days`;
                } else {
                    status.innerHTML = `<h2 style="color:#ff4444">NOT ELIGIBLE</h2>User: ${data.username}<br>Karma: ${data.details.karma} (Need 1)<br>Age: ${data.details.age} days (Need 90)`;
                }
            })
            .catch(err => {
                status.innerHTML = `<h2 style="color:#ff4444">CONNECTION ERROR</h2>
                                    <p>The backend is likely asleep or blocked by CORS.</p>
                                    <p style="font-size:10px">${err.message}</p>`;
            });
        } else {
            status.innerText = "No code received from Reddit.";
        }
    </script>
</body>
</html>
