<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifying... | Reddit Karma Checker</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f8f8f8;
      color: #333;
      text-align: center;
      padding: 4rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    img.logo {
      height: 50px;
      margin-bottom: 1.5rem;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      max-width: 450px;
      width: 100%;
    }
    h2 {
      font-weight: 600;
      font-size: 1.6rem;
      margin-bottom: 10px;
    }
    p {
      font-size: 0.95rem;
      color: #666;
    }
    .status-box {
      margin-top: 2rem;
      padding: 15px;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      background: #f0f2f5;
    }
    .loading { color: #007bff; }
    .success { color: #28a745; background: #e8f5e9; }
    .fail { color: #dc3545; background: #ffebee; }
    
    /* Small spinner animation */
    .spinner {
      border: 4px solid rgba(0, 0, 0, 0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: #FF4500;
      animation: spin 1s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://redditinc.com/hs-fs/hubfs/Reddit%20Inc/Content/Brand%20Page/Reddit_Logo.png" class="logo" alt="Reddit Logo">
    <h2>Account Verification</h2>
    <p>Please wait while we check your Reddit account status and karma levels.</p>
    
    <div id="result" class="status-box">
      <div class="spinner"></div> <span class="loading">Processing Reddit Login...</span>
    </div>
  </div>

  <script>
    async function verifyReddit() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state'); // This contains 'Sprout' or 'Rapid'

      const resultDiv = document.getElementById('result');

      // 1. Check if the user denied the request or code is missing
      if (!code) {
        resultDiv.className = "status-box fail";
        resultDiv.innerHTML = "❌ Error: Authorization denied or missing.";
        return;
      }

      try {
        // 2. Send the data to your Render Backend
        const response = await fetch('https://fancykarma-backend.onrender.com/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            code: code,
            state: state, // Pass the platform (Sprout/Rapid)
            redirect_uri: "https://nate0911.github.io/Fancykarma/redirect.html"
          })
        });

        const data = await response.json();

        // 3. Handle the Backend Response
        if (data.status === 'pass') {
          resultDiv.className = "status-box success";
          resultDiv.innerHTML = "✅ Verified! Sending you to the task...";
          
          // The backend sends the full 999 link with workerId=Platform_Name_Random
          setTimeout(() => {
            window.location.href = data.redirect;
          }, 1500);
          
        } else {
          resultDiv.className = "status-box fail";
          resultDiv.innerHTML = `❌ ${data.reason || 'Account does not meet requirements.'}`;
        }

      } catch (err) {
        resultDiv.className = "status-box fail";
        resultDiv.innerHTML = `❌ Connection Error: ${err.message}`;
        console.error("Verification error:", err);
      }
    }

    // Run the verification on page load
    verifyReddit();
  </script>
</body>
</html>
