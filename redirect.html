<!DOCTYPE html>
<html>
<head>
  <title>Verifying Account...</title>
  <style>
    body { background: #0b0b0b; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; text-align: center; }
    .loader { border: 4px solid #333; border-top: 4px solid #FF4500; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .error-box { background: #1a1a1b; border: 1px solid #FF4500; padding: 25px; border-radius: 15px; max-width: 320px; }
    button { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-family: 'Verdana'; cursor: pointer; margin-top: 15px; }
  </style>
</head>
<body>
  <div id="status">
    <div class="loader"></div>
    <p>Connecting to Reddit API...</p>
    <p style="font-size: 12px; color: #888;">(This may take 30s if the server is waking up)</p>
  </div>

  <script>
    async function runAuth() {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      
      if(!code) {
        document.getElementById('status').innerHTML = "❌ Reddit access denied.";
        return;
      }

      try {
        const response = await fetch('https://fancykarma-backend.onrender.com/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            code: code, 
            redirect_uri: "https://nate0911.github.io/Fancykarma/redirect.html" 
          })
        });

        const data = await response.json();

        if (data.status === 'pass') {
          window.location.href = `index.html?status=pass&r=${data.task.rowIndex}&c=${encodeURIComponent(data.task.comment)}&u=${encodeURIComponent(data.task.postUrl)}`;
        } else {
          // If fail, show the actual reason provided by backend
          document.getElementById('status').innerHTML = `
            <div class="error-box">
              <h2 style="color:#FF4500">❌ Verification Failed</h2>
              <p>${data.reason || "Unknown Error"}</p>
              <button onclick="location.reload()">Retry Verification</button>
            </div>`;
        }
      } catch (error) {
        document.getElementById('status').innerHTML = `
          <div class="error-box">
            <h2>❌ Server Wake-up</h2>
            <p>The backend is waking up from sleep. Please wait 10 seconds and try again.</p>
            <button onclick="location.reload()">Try Again Now</button>
          </div>`;
      }
    }
    runAuth();
  </script>
</body>
</html>
