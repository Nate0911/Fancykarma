<!DOCTYPE html>
<html>
<head><title>Verifying...</title><style>body{background:#0b0b0b;color:white;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;}</style></head>
<body>
  <div id="msg">Verifying Reddit Stats...</div>
  <script>
    async function run() {
      const code = new URLSearchParams(window.location.search).get('code');
      if(!code) return document.getElementById('msg').innerText = "❌ Auth Denied";
      try {
        const res = await fetch('https://fancykarma-backend.onrender.com/auth', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ code, redirect_uri: "https://nate0911.github.io/Fancykarma/redirect.html" })
        });
        const data = await res.json();
        if(data.status === 'pass') {
          window.location.href = `index.html?status=pass&r=${data.task.rowIndex}&c=${encodeURIComponent(data.task.comment)}&u=${encodeURIComponent(data.task.postUrl)}`;
        } else {
          document.getElementById('msg').innerHTML = `<h2 style="color:#FF4500">❌ ${data.reason || 'Requirement Fail'}</h2>`;
        }
      } catch(e) { document.getElementById('msg').innerText = "❌ Connection Error. Please refresh."; }
    }
    run();
  </script>
</body>
</html>
