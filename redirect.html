<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FancyKarma</title>
    <style>
        body { background: #0b0e11; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Locked Font for all buttons */
        button { 
            font-family: 'Verdana', sans-serif !important; 
            background: #ff4500; color: white; border: none; padding: 15px 30px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #cc3700; transform: translateY(-2px); }

        .card { 
            background: #1a1a1b; padding: 40px; border-radius: 20px; text-align: center;
            width: 350px; border: 1px solid #333; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
        }

        /* System Ready Animation */
        .status-container { margin-top: 15px; font-size: 0.9rem; color: #888; }
        .dot { height: 10px; width: 10px; background: #00ff00; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #00ff00; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        video { border-radius: 12px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hidden { display: none; opacity: 0; transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="main-card" class="card">
        <video width="100%" autoplay loop muted playsinline>
            <source src="https://i.imgur.com/SVGjM9E.mp4" type="video/mp4">
        </video>
        <h2>Verify Access</h2>
        <div class="status-container"><span class="dot"></span> System Ready</div>
        <br>
        <button onclick="startAuth()">Connect via Reddit</button>
    </div>

    <script>
        function startAuth() {
            const clientID = 'u8MeOBIFfObKKRsdmExg_w';
            const redirect = encodeURIComponent('https://nate0911.github.io/Fancykarma/redirect.html');
            window.location.href = `https://www.reddit.com/api/v1/authorize?client_id=${clientID}&response_type=code&state=random_state&redirect_uri=${redirect}&duration=temporary&scope=identity`;
        }
    </script>
</body>
</html>
