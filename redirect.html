<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Verification Hub</title>
  <style>
    body { background-color: #0b0b0b; color: #ffffff; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: #161616; border-radius: 20px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); text-align: center; max-width: 380px; width: 90%; border: 1px solid #333; display: none; }
    .active { display: block; }

    /* Reddit Comment UI */
    .reddit-comment-card { background: #1a1a1b; border: 1px solid #343536; border-radius: 4px; padding: 15px; text-align: left; margin: 20px 0; border-left: 3px solid #FF4500; }
    .user-info { font-size: 12px; color: #818384; font-weight: bold; margin-bottom: 5px; }
    .comment-body { font-size: 15px; color: #d7dadc; line-height: 1.5; font-family: 'Verdana', sans-serif; }

    /* Button Styling - Verdana Locked */
    .btn-container { position: relative; width: 100%; height: 60px; margin-top: 10px; }
    button { position: relative; background-color: #333; color: white; border: none; width: 100%; height: 100%; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; overflow: hidden; z-index: 1; font-family: 'Verdana', sans-serif; text-transform: uppercase; }
    button::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background-color: #FF4500; z-index: -1; animation: orange-fill-loop 2.5s infinite alternate ease-in-out; }
    @keyframes orange-fill-loop { 0% { left: -100%; } 100% { left: 0; } }
    
    /* Custom Modal (Popup) */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal { background: #1c1c1c; padding: 25px; border-radius: 15px; border: 1px solid #444; text-align: center; max-width: 300px; width: 80%; }
    .modal h3 { color: #FF4500; margin-top: 0; }
    .modal button { height: 45px; background: #333; margin-top: 15px; }

    input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; }
  </style>
</head>
<body>

  <div class="card active" id="s1">
    <h2>Instructions</h2>
    <p>Authorize Reddit to unlock your task.</p>
    <video autoplay loop muted playsinline style="width:100%; border-radius:12px; margin-bottom:15px;"><source src="https://i.imgur.com/SVGjM9E.mp4" type="video/mp4"></video>
    <div class="btn-container"><button onclick="login()">AUTHORIZE 🔒</button></div>
  </div>

  <div class="card" id="s2">
    <h2>Post This Comment</h2>
    <div class="reddit-comment-card">
      <div class="user-info">u/Task_System • Just Now</div>
      <div class="comment-body" id="text-to-copy"></div>
    </div>
    <button onclick="copyAndOpen()" style="height:55px; background:#28a745;">COPY COMMENT</button>
    <p style="margin-top:20px;">Paste the link to your comment:</p>
    <input type="text" id="reddit-url" placeholder="https://reddit.com/...">
    <button onclick="verify()" id="v-btn" style="height:60px;">VERIFY ✅</button>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="mTitle">Status</h3>
      <p id="mBody"></p>
      <button onclick="closeModal()">OK</button>
    </div>
  </div>

  <script>
    let activeTask = null;
    function login() {
      const cid = "70G0I__N4hh4F48tKem05A";
      const uri = "https://nate0911.github.io/Fancykarma/redirect.html";
      window.location.href = `https://www.reddit.com/api/v1/authorize?client_id=${cid}&response_type=code&state=auth&redirect_uri=${uri}&duration=temporary&scope=identity`;
    }

    window.onload = () => {
      const p = new URLSearchParams(window.location.search);
      if (p.get('status') === 'pass') {
        activeTask = { c: decodeURIComponent(p.get('c')), u: decodeURIComponent(p.get('u')), r: p.get('r') };
        document.getElementById('s1').classList.remove('active');
        document.getElementById('s2').classList.add('active');
        document.getElementById('text-to-copy').innerText = activeTask.c;
      }
    };

    function copyAndOpen() {
      navigator.clipboard.writeText(activeTask.c);
      showModal("Copied!", "Opening Reddit post...");
      setTimeout(() => window.open(activeTask.u, '_blank'), 1000);
    }

    async function verify() {
      const val = document.getElementById('reddit-url').value;
      if(!val.includes('reddit.com')) return showModal("Error", "Paste a valid link.");
      document.getElementById('v-btn').innerText = "VERIFYING...";
      const res = await fetch('https://fancykarma-backend.onrender.com/verify-task', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ commentUrl: val, rowIndex: activeTask.r })
      });
      const data = await res.json();
      showModal(data.status === 'pass' ? "Verified" : "Failed", data.message);
      document.getElementById('v-btn').innerText = "VERIFY NOW ✅";
    }

    function showModal(t, b) {
      document.getElementById('mTitle').innerText = t;
      document.getElementById('mBody').innerText = b;
      document.getElementById('modalOverlay').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
  </script>
</body>
</html>
