<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verifying...</title>
  <style>
    body { background: #0b0b0b; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
    .loader { border: 4px solid #333; border-top: 4px solid #FF4500; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div>
    <div class="loader"></div>
    <p id="msg">Verifying Reddit Account...</p>
  </div>

  <script>
    async function init() {
      const code = new URLSearchParams(window.location.search).get('code');
      if(!code) { document.getElementById('msg').innerText = "Error: No Code Provided."; return; }

      try {
        const response = await fetch('https://fancykarma-backend.onrender.com/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code, redirect_uri: "https://nate0911.github.io/Fancykarma/redirect.html" })
        });
        const data = await response.json();

        if (data.status === 'pass') {
          // Send data to index.html and go back
          if (window.opener) {
            window.opener.postMessage(data, "*");
            window.close();
          } else {
            // If they aren't using a popup, we redirect back to index.html
            // The index.html will pick up the task from localStorage
            localStorage.setItem('activeTask', JSON.stringify(data.task));
            window.location.href = "index.html";
          }
        } else {
          document.getElementById('msg').innerText = "❌ " + data.reason;
        }
      } catch (err) {
        document.getElementById('msg').innerText = "❌ Server Connection Failed.";
      }
    }
    init();
  </script>
</body>
</html>
