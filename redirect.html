<!DOCTYPE html>
<html>
<head><title>Verifying...</title></head>
<body style="background:#0b0b0b; color:white; font-family:sans-serif; text-align:center; padding-top:20%;">
  <p>Verifying with Reddit... please wait.</p>
  <script>
    async function run() {
      const code = new URLSearchParams(window.location.search).get('code');
      try {
        const res = await fetch('https://fancykarma-backend.onrender.com/auth', {
          method: 'POST', 
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ 
            code, 
            redirect_uri: "https://nate0911.github.io/Fancykarma/redirect.html" 
          })
        });
        const data = await res.json();
        if(data.status === 'pass') {
          window.location.href = `index.html?status=pass&r=${data.task.rowIndex}&c=${encodeURIComponent(data.task.comment)}&u=${encodeURIComponent(data.task.postUrl)}`;
        } else {
          alert("Error: " + data.reason);
          window.location.href = 'index.html';
        }
      } catch(e) { alert("Server Error. Refresh index page."); }
    }
    run();
  </script>
</body>
</html>
