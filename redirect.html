<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verifying...</title>
  <style>
    body { background: #0b0b0b; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
    .loader { border: 4px solid #333; border-top: 4px solid #FF4500; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .status-box.fail { background: #ffebee; color: #dc3545; padding: 15px; border-radius: 10px; margin-top: 20px; }
  </style>
</head>
<body>
  <div id="result">
    <div class="loader"></div>
    <p>Verifying Reddit Stats...</p>
  </div>

  <script>
    async function init() {
      const code = new URLSearchParams(window.location.search).get('code');
      const resultDiv = document.getElementById('result');
      if(!code) { resultDiv.innerHTML = "❌ Auth Denied."; return; }

      try {
        const response = await fetch('https://fancykarma-backend.onrender.com/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code, redirect_uri: "https://nate0911.github.io/Fancykarma/redirect.html" })
        });
        const data = await response.json();

        if (data.status === 'pass') {
          // Send back to index.html with the data in the URL
          const nextUrl = `index.html?status=pass&row=${data.task.rowIndex}&comment=${encodeURIComponent(data.task.comment)}&url=${encodeURIComponent(data.task.postUrl)}`;
          window.location.href = nextUrl;
        } else {
          resultDiv.innerHTML = `<div class="status-box fail">❌ ${data.reason || 'Requirement Fail'}</div>`;
        }
      } catch (err) {
        resultDiv.innerHTML = "❌ Server Error.";
      }
    }
    init();
  </script>
</body>
</html>
