<!DOCTYPE html>
<html>
<head>
    <title>Verifying...</title>
    <style>body { background: #000; color: #FF4500; font-family: 'Verdana', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }</style>
</head>
<body>
    <div id="msg">PROCESSING...</div>
    <script>
        const code = new URLSearchParams(window.location.search).get('code');
        if (code) {
            fetch('https://fancykarma-backend.onrender.com/verify-reddit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code })
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('msg').innerText = data.eligible ? `WELCOME ${data.username}!` : "REQUIREMENTS NOT MET";
            })
            .catch(() => { document.getElementById('msg').innerText = "SERVER ERROR (401)"; });
        }
    </script>
</body>
</html>
