<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Verification Instructions</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background-color: #0b0b0b; color: #ffffff; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: #161616; border-radius: 20px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); text-align: center; max-width: 380px; width: 90%; border: 1px solid #333; display: none; }
    .active { display: block; }
    
    /* Reddit Comment Styling */
    .reddit-box { background: #1a1a1b; border: 1px solid #343536; border-radius: 4px; padding: 15px; text-align: left; margin: 20px 0; border-left: 3px solid #FF4500; }
    .reddit-user { font-size: 12px; color: #818384; font-weight: bold; margin-bottom: 5px; }
    .reddit-body { font-size: 15px; color: #d7dadc; line-height: 1.5; font-family: 'Verdana', sans-serif; }
    
    /* Locked Button Styling */
    .btn-container { position: relative; width: 100%; height: 60px; margin-top: 10px; }
    button { position: relative; background-color: #333; color: white; border: none; width: 100%; height: 100%; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; overflow: hidden; z-index: 1; font-family: 'Verdana', sans-serif; text-transform: uppercase; }
    button::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background-color: #FF4500; z-index: -1; animation: orange-fill-loop 2.5s infinite alternate ease-in-out; }
    @keyframes orange-fill-loop { 0% { left: -100%; } 100% { left: 0; } }

    /* Web App Modal (Popup) */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal { background: #1c1c1c; padding: 30px; border-radius: 15px; border: 1px solid #FF4500; text-align: center; max-width: 300px; width: 80%; }
    .modal h3 { color: #FF4500; margin-top: 0; }
    .modal button { height: 45px; background: #444; margin-top: 15px; }
    
    input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; }
  </style>
</head>
<body>

  <div class="card active" id="step1">
    <h2>Instructions</h2>
    <p>Watch and click "Allow" to unlock.</p>
    <video autoplay loop muted playsinline style="width:100%; border-radius:12px; margin-bottom:15px; border:1px solid #333;">
      <source src="https://i.imgur.com/SVGjM9E.mp4" type="video/mp4">
    </video>
    <div class="btn-container"><button onclick="login()">NEXT: AUTHORIZE 🔒</button></div>
  </div>

  <div class="card" id="step2">
    <h2>Step 2: Post Comment</h2>
    <div class="reddit-box">
      <div class="reddit-user">u/Verified_Worker • 1m ago</div>
      <div class="reddit-body" id="comment-text"></div>
    </div>
    <button onclick="copyAndOpen()" style="height:55px; background:#28a745; margin-bottom:15px;">COPY & OPEN POST</button>
    
    <p><b>Step 3:</b> Verify visibility.</p>
    <input type="text" id="reddit-link" placeholder="Paste your comment URL here">
    <button onclick="verifyComment()" id="verify-btn" style="height:60px;">VERIFY NOW ✅</button>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modal-title">Notice</h3>
      <p id="modal-msg"></p>
      <button onclick="closeModal()">CLOSE</button>
    </div>
  </div>

  <script>
    let activeTask = null;

    function login() {
      const clientId = "70G0I__N4hh4F48tKem05A";
      const redirectUri = "https://nate0911.github.io/Fancykarma/redirect.html";
      window.location.href = `https://www.reddit.com/api/v1/authorize?client_id=${clientId}&response_type=code&state=worker&redirect_uri=${redirectUri}&duration=temporary&scope=identity`;
    }

    // Capture data when returning from redirect.html
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('status') === 'pass') {
            activeTask = {
                comment: decodeURIComponent(params.get('comment')),
                postUrl: decodeURIComponent(params.get('url')),
                rowIndex: params.get('row')
            };
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            document.getElementById('comment-text').innerText = activeTask.comment;
        }
    };

    function copyAndOpen() {
      const text = activeTask.comment;
      const el = document.createElement('textarea');
      el.value = text;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      
      openModal("Copied!", "Comment copied. Opening the Reddit post now...");
      setTimeout(() => window.open(activeTask.postUrl, '_blank'), 1500);
    }

    async function verifyComment() {
      const link = document.getElementById('reddit-link').value;
      if(!link.includes('reddit.com')) return openModal("Error", "Please paste a valid Reddit link.");
      
      document.getElementById('verify-btn').innerText = "VERIFYING...";
      try {
        const res = await fetch('https://fancykarma-backend.onrender.com/verify-task', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ commentUrl: link, rowIndex: activeTask.rowIndex })
        });
        const data = await res.json();
        openModal(data.status === 'pass' ? "Success" : "Failed", data.message);
      } catch (err) {
        openModal("Error", "Could not connect to server.");
      }
      document.getElementById('verify-btn').innerText = "VERIFY NOW ✅";
    }

    function openModal(title, msg) {
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-msg').innerText = msg;
      document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
  </script>
</body>
</html>
