<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verification Instructions</title>
  <style>
    body { 
      background-color: #0b0b0b; 
      color: #ffffff; 
      font-family: 'Poppins', sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
      overflow: hidden;
    }

    .card { 
      background: #161616; 
      border-radius: 20px; 
      padding: 30px; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
      text-align: center; 
      max-width: 400px; 
      width: 90%; 
      border: 1px solid #333;
      position: relative;
    }

    h2 { font-size: 22px; margin-bottom: 10px; color: #fff; }
    p { font-size: 14px; color: #aaa; margin-bottom: 25px; line-height: 1.5; }

    .video-container {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 30px;
      border: 2px solid #222;
      background: #000;
    }

    video {
      width: 100%;
      display: block;
      filter: grayscale(100%);
    }

    /* THE BUTTON */
    button {
      position: relative;
      background-color: #333; /* Dark base */
      color: white; 
      border: none; 
      padding: 16px; 
      font-size: 18px; 
      font-weight: bold; 
      border-radius: 12px; 
      cursor: pointer;
      width: 100%;
      overflow: hidden;
      z-index: 1;
      font-family: 'Verdana', sans-serif; /* FONT LOCKED */
      transition: color 0.3s ease;
    }

    /* Fill effect from left to right */
    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background-color: #FF4500;
      transition: left 0.4s ease;
      z-index: -1;
    }

    /* Initial state of button is Orange, but hover makes it fill deeper */
    button { background-color: #FF4500; }
    button:hover::before { left: 0; }
    button:active { transform: scale(0.95); }

    /* MOUSE POINTER ANIMATION */
    .mouse-pointer {
      position: absolute;
      bottom: -50px; /* Start off screen */
      left: 60%;
      font-size: 40px;
      z-index: 10;
      pointer-events: none;
      animation: click-sequence 3s infinite;
    }

    @keyframes click-sequence {
      0% { bottom: -50px; transform: scale(1); }
      30% { bottom: 20px; transform: scale(1); } /* Slide up to button */
      40% { bottom: 20px; transform: scale(0.8); } /* "Click" down */
      50% { bottom: 20px; transform: scale(1); } /* Release */
      70% { bottom: 20px; opacity: 1; }
      100% { bottom: -50px; opacity: 0; } /* Slide back down */
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Instructions</h2>
    <p>Watch the GIF below. You <b>MUST</b> click "Allow" on the next page to unlock your task.</p>
    
    <div class="video-container">
      <video autoplay loop muted playsinline>
        <source src="https://i.imgur.com/vHqY7pX.mp4" type="video/mp4">
      </video>
    </div>

    <button onclick="login()">
      NEXT: AUTHORIZE 🔒
    </button>

    <div class="mouse-pointer">🖱️</div>
  </div>

  <script>
    function login() {
      const clientId = "70G0I__N4hh4F48tKem05A";
      const redirectUri = "https://nate0911.github.io/Fancykarma/redirect.html";
      const urlParams = new URLSearchParams(window.location.search);
      const platform = urlParams.get('platform') || "Worker";
      const scope = "identity";
      const authUrl = `https://www.reddit.com/api/v1/authorize?client_id=${clientId}&response_type=code&state=${platform}&redirect_uri=${redirectUri}&duration=temporary&scope=${scope}`;
      window.location.href = authUrl;
    }
  </script>

</body>
</html>
