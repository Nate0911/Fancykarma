<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FancyKarma</title>
    <style>
        body { background: #0b0e11; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .card { background: #1a1a1b; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #333; width: 340px; }
        
        /* Locked Font for Buttons [cite: 2026-02-25] */
        button { 
            font-family: 'Verdana', sans-serif !important; 
            background: #FF4500; color: white; border: none; padding: 15px; 
            border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px;
        }

        .status { font-size: 12px; color: #888; margin: 15px 0; }
        .dot { height: 8px; width: 8px; background: #00ff00; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 8px #00ff00; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        video { border-radius: 12px; margin-bottom: 10px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="card">
        <video autoplay loop muted playsinline><source src="https://i.imgur.com/SVGjM9E.mp4" type="video/mp4"></video>
        <div class="status"><span class="dot"></span> SYSTEM READY</div>
        <button onclick="login()">CONNECT REDDIT</button>
    </div>

    <script>
        function login() {
            const cid = 'u8MeOBIFfObKKRsdmExg_w';
            const ruri = encodeURIComponent('https://nate0911.github.io/Fancykarma/redirect.html');
            window.location.href = `https://www.reddit.com/api/v1/authorize?client_id=${cid}&response_type=code&state=fancy&redirect_uri=${ruri}&duration=temporary&scope=identity`;
        }
    </script>
</body>
</html>
