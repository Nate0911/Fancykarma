<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Verification Instructions</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    body { 
      background-color: #0b0b0b; 
      color: #ffffff; 
      font-family: 'Poppins', sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      margin: 0; 
      overflow-x: hidden;
    }

    .card { 
      background: #161616; 
      border-radius: 20px; 
      padding: 25px; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
      text-align: center; 
      max-width: 380px; 
      width: 90%; 
      border: 1px solid #333;
      position: relative;
      margin-bottom: 20px;
    }

    h2 { font-size: 22px; margin-bottom: 5px; color: #fff; }
    p { font-size: 14px; color: #aaa; margin-bottom: 20px; line-height: 1.4; }

    .video-container {
      width: 100%;
      height: 250px; 
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
      border: 1px solid #444;
      background: #000;
      display: flex;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover !important; 
      display: block;
    }

    .btn-container {
      position: relative;
      width: 100%;
      height: 60px;
      margin-top: 10px;
    }

    button {
      position: relative;
      background-color: #333; 
      color: white; 
      border: none; 
      width: 100%;
      height: 100%;
      font-size: 16px; 
      font-weight: bold; 
      border-radius: 12px; 
      cursor: pointer;
      overflow: hidden;
      z-index: 1;
      font-family: 'Verdana', sans-serif; 
      text-transform: uppercase;
    }

    .blue-btn { background-color: #007bff; }
    .green-btn { background-color: #28a745; }

    button::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background-color: #FF4500;
      z-index: -1;
      animation: orange-fill-loop 2.5s infinite alternate ease-in-out;
    }

    @keyframes orange-fill-loop {
      0% { left: -100%; }
      100% { left: 0; }
    }

    .real-cursor {
      position: absolute;
      bottom: -60px;
      left: 55%;
      font-size: 30px; 
      color: #000000; 
      z-index: 10;
      pointer-events: none;
      filter: drop-shadow(0 0 2px rgba(255,255,255,0.8));
      animation: cursor-click 3s infinite;
    }

    @keyframes cursor-click {
      0% { bottom: -60px; transform: scale(1); }
      30% { bottom: 10px; transform: scale(1); }
      40% { bottom: 10px; transform: scale(0.8); }
      50% { bottom: 10px; transform: scale(1); }
      80% { bottom: 10px; opacity: 1; }
      100% { bottom: -60px; opacity: 0; }
    }

    .task-box {
      background: #222;
      border-radius: 10px;
      padding: 15px;
      margin: 15px 0;
      text-align: left;
      border: 1px solid #444;
    }

    .task-label { font-size: 12px; color: #888; margin-bottom: 5px; text-transform: uppercase; }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #444;
      background: #000;
      color: #fff;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div class="card" id="main-auth-card">
    <h2>Instructions</h2>
    <p>Watch below. You <b>MUST</b> click "Allow" on the next page to unlock your task.</p>
    
    <div class="video-container">
      <video autoplay loop muted playsinline>
        <source src="https://i.imgur.com/SVGjM9E.mp4" type="video/mp4">
      </video>
    </div>

    <div class="btn-container">
        <button onclick="login()">
          NEXT: AUTHORIZE 🔒
        </button>
        <i class="fa-solid fa-mouse-pointer real-cursor"></i>
    </div>
  </div>

  <div class="card" id="task-card" style="display: none;">
    <h2>Your Task</h2>
    <p>Follow the steps below to finish.</p>

    <div class="task-box">
      <div class="task-label"><i class="fa-solid fa-link"></i> Post URL</div>
      <a id="post-link" href="#" target="_blank" style="color: #007bff; font-size: 13px; word-break: break-all;">Opening Link...</a>
    </div>

    <div class="task-box">
      <div class="task-label"><i class="fa-solid fa-comment"></i> Comment to Post</div>
      <div id="comment-text" style="font-size: 14px; line-height: 1.4; margin-bottom: 10px;">Loading comment...</div>
      <button class="green-btn" onclick="copyComment()" style="height: 40px; font-size: 14px;">Copy Comment</button>
    </div>

    <div id="comment-verification" style="margin-top: 20px; border-top: 1px solid #333; pt: 15px;">
        <p style="font-size: 13px; margin-bottom: 5px;"><b>Final Step:</b> Verify visibility.</p>
        <input type="text" id="reddit-link" placeholder="Paste your comment URL here...">
        <button onclick="verifyComment()" id="verify-btn" style="height: 50px; font-family: 'Verdana';">Verify Visibility</button>
        <p id="verify-msg" style="font-size: 13px; margin-top: 10px; font-weight: bold;"></p>
    </div>
  </div>

  <script>
    let activeTask = null;

    function login() {
      const clientId = "70G0I__N4hh4F48tKem05A";
      const redirectUri = "https://nate0911.github.io/Fancykarma/redirect.html";
      const urlParams = new URLSearchParams(window.location.search);
      const platform = urlParams.get('platform') || "Worker";
      const scope = "identity";
      const authUrl = `https://www.reddit.com/api/v1/authorize?client_id=${clientId}&response_type=code&state=${platform}&redirect_uri=${redirectUri}&duration=temporary&scope=${scope}`;
      window.location.href = authUrl;
    }

    // This runs when the user comes back from redirect.html with task data
    window.addEventListener('message', function(event) {
      if (event.data.status === 'pass') {
        activeTask = event.data.task;
        document.getElementById('main-auth-card').style.display = 'none';
        document.getElementById('task-card').style.display = 'block';
        document.getElementById('comment-text').innerText = activeTask.comment;
        document.getElementById('post-link').href = activeTask.postUrl;
        document.getElementById('post-link').innerText = activeTask.postUrl;
      }
    });

    function copyComment() {
      const text = document.getElementById('comment-text').innerText;
      navigator.clipboard.writeText(text);
      alert("Comment copied! Now open the Reddit post.");
    }

    async function verifyComment() {
      const link = document.getElementById('reddit-link').value;
      const msg = document.getElementById('verify-msg');
      const btn = document.getElementById('verify-btn');

      if (!link.includes('reddit.com')) {
        msg.innerText = "❌ Please paste a valid Reddit link.";
        msg.style.color = "#ff4500";
        return;
      }

      msg.innerText = "Checking visibility...";
      msg.style.color = "#aaa";
      btn.disabled = true;

      try {
        const response = await fetch('https://fancykarma-backend.onrender.com/verify-task', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            commentUrl: link, 
            rowIndex: activeTask.rowIndex 
          })
        });

        const result = await response.json();
        msg.innerText = result.message;
        
        if (result.status === 'pass') {
          msg.style.color = "#28a745"; // Success Green
          btn.style.display = "none";
        } else {
          msg.style.color = "#ff4500"; // Error Orange
          btn.disabled = false;
        }
      } catch (err) {
        msg.innerText = "❌ Error connecting to server.";
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
