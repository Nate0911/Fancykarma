<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Verification Instructions</title>
  <style>
    /* B&W Theme */
    body { 
      background-color: #000000; 
      color: #ffffff; 
      font-family: 'Poppins', sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      margin: 0; 
      overflow: hidden;
    }

    .card { 
      background: #111111; 
      border-radius: 20px; 
      padding: 25px; 
      box-shadow: 0 0 40px rgba(255, 69, 0, 0.15); 
      text-align: center; 
      max-width: 380px; 
      width: 85%; 
      border: 1px solid #222;
      position: relative;
    }

    h2 { font-size: 20px; margin-bottom: 8px; color: #fff; }
    p { font-size: 13px; color: #888; margin-bottom: 15px; line-height: 1.4; }

    /* Mobile Friendly GIF (Max height set so it doesn't drown the page) */
    .video-container {
      width: 100%;
      max-height: 250px; 
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
      border: 1px solid #333;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%);
    }

    /* THE BUTTON: Auto-Loop Orange Fill from Left */
    .btn-container {
      position: relative;
      width: 100%;
      height: 55px;
      margin-top: 10px;
    }

    button {
      position: relative;
      background-color: #333;
      color: white; 
      border: none; 
      width: 100%;
      height: 100%;
      font-size: 18px; 
      font-weight: bold; 
      border-radius: 12px; 
      cursor: pointer;
      overflow: hidden;
      z-index: 1;
      font-family: 'Verdana', sans-serif; /* FONT LOCKED */
    }

    /* Continuous Loop Animation */
    button::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background-color: #FF4500;
      z-index: -1;
      animation: fill-loop 3s infinite ease-in-out;
    }

    @keyframes fill-loop {
      0% { left: -100%; }
      40% { left: 0; }
      70% { left: 0; }
      100% { left: 100%; }
    }

    /* HAND POINTER ANIMATION: Slides up from bottom and "clicks" */
    .hand-pointer {
      position: absolute;
      bottom: -60px;
      left: 55%;
      font-size: 40px;
      z-index: 10;
      pointer-events: none;
      animation: click-demo 3s infinite;
    }

    @keyframes click-demo {
      0% { bottom: -60px; transform: scale(1); }
      30% { bottom: 5px; transform: scale(1); }
      40% { bottom: 5px; transform: scale(0.8); } /* Mimics tap */
      50% { bottom: 5px; transform: scale(1); }
      80% { bottom: 5px; opacity: 1; }
      100% { bottom: -60px; opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Instructions</h2>
    <p>Watch below. You <b>MUST</b> click "Allow" on the next page to unlock your task.</p>
    
    <div class="video-container">
      <video autoplay loop muted playsinline>
        <source src="https://i.imgur.com/SVGjM9E.mp4" type="video/mp4">
      </video>
    </div>

    <div class="btn-container">
        <button onclick="login()">
          NEXT: AUTHORIZE 🔒
        </button>
        <div class="hand-pointer">👆</div>
    </div>
  </div>

  <script>
    function login() {
      const clientId = "70G0I__N4hh4F48tKem05A";
      const redirectUri = "https://nate0911.github.io/Fancykarma/redirect.html";
      const urlParams = new URLSearchParams(window.location.search);
      const platform = urlParams.get('platform') || "Worker";
      const scope = "identity";
      const authUrl = `https://www.reddit.com/api/v1/authorize?client_id=${clientId}&response_type=code&state=${platform}&redirect_uri=${redirectUri}&duration=temporary&scope=${scope}`;
      window.location.href = authUrl;
    }
  </script>

</body>
</html>
