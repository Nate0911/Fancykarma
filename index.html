<!DOCTYPE html>
<html>
<head>
    <title>FancyKarma</title>
    <style>
        body { background: #0b0e11; color: white; text-align: center; padding-top: 50px; font-family: sans-serif; }
        .card { background: #1a1a1b; padding: 30px; border-radius: 15px; display: inline-block; border: 1px solid #333; }
        /* Verdana Locked Font [cite: 2026-02-25] */
        button { font-family: 'Verdana', sans-serif !important; background: #FF4500; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .dot { height: 10px; width: 10px; background: #00ff00; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 8px #00ff00; }
        video { width: 300px; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <video autoplay loop muted playsinline><source src="https://i.imgur.com/SVGjM9E.mp4" type="video/mp4"></video>
        <p><span class="dot"></span> SYSTEM READY</p>
        <button onclick="login()">CONNECT REDDIT</button>
    </div>
    <script>
        function login() {
            const cid = 'u8MeOBIFfObKKRsdmExg_w';
            const ruri = encodeURIComponent('https://nate0911.github.io/Fancykarma/redirect.html');
            window.location.href = `https://www.reddit.com/api/v1/authorize?client_id=${cid}&response_type=code&state=fancy&redirect_uri=${ruri}&duration=temporary&scope=identity`;
        }
    </script>
</body>
</html>
