<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verification Instructions</title>
  <style>
    /* Black and White Theme */
    body { 
      background-color: #000000; 
      color: #ffffff; 
      font-family: 'Poppins', sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
      overflow: hidden;
    }

    .card { 
      background: #111111; 
      border-radius: 20px; 
      padding: 35px; 
      box-shadow: 0 0 50px rgba(255, 69, 0, 0.1); 
      text-align: center; 
      max-width: 400px; 
      width: 90%; 
      border: 1px solid #222;
      position: relative;
    }

    h2 { font-size: 24px; margin-bottom: 10px; color: #fff; }
    p { font-size: 14px; color: #888; margin-bottom: 25px; line-height: 1.5; }

    /* Video/GIF Container - Forced Grayscale */
    .video-container {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 30px;
      border: 1px solid #333;
      background: #000;
    }

    video {
      width: 100%;
      display: block;
      filter: grayscale(100%); /* B&W Effect */
    }

    /* THE BUTTON: Starts Gray, Fills Orange from Left */
    .btn-container {
      position: relative;
      width: 100%;
      height: 60px;
      margin-top: 10px;
    }

    button {
      position: relative;
      background-color: #333; /* Default Gray */
      color: white; 
      border: none; 
      width: 100%;
      height: 100%;
      font-size: 18px; 
      font-weight: bold; 
      border-radius: 12px; 
      cursor: pointer;
      overflow: hidden;
      z-index: 1;
      font-family: 'Verdana', sans-serif; /* FONT LOCKED */
      transition: color 0.3s ease;
    }

    /* The Fill Effect */
    button::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background-color: #FF4500; /* Pop Orange */
      transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: -1;
    }

    /* Hover and Initial State */
    button:hover::after {
      left: 0;
    }

    button:active {
      transform: scale(0.98);
    }

    /* MOUSE POINTER ANIMATION: Comes from bottom and "clicks" */
    .mouse-pointer {
      position: absolute;
      bottom: -60px; /* Hidden off card */
      left: 55%;
      font-size: 45px;
      z-index: 10;
      pointer-events: none;
      animation: click-demo 3.5s infinite;
    }

    @keyframes click-demo {
      0% { bottom: -60px; transform: scale(1); }
      30% { bottom: 10px; transform: scale(1); } /* Slides up onto button */
      40% { bottom: 10px; transform: scale(0.85); } /* Clicks down */
      50% { bottom: 10px; transform: scale(1); } /* Releases */
      80% { bottom: 10px; opacity: 1; }
      100% { bottom: -60px; opacity: 0; } /* Slides away */
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Instructions</h2>
    <p>Watch the GIF below. You <b>MUST</b> click "Allow" on the next page to unlock your task.</p>
    
    <div class="video-container">
      <video autoplay loop muted playsinline>
        <source src="https://i.imgur.com/SVGjM9E.mp4" type="video/mp4">
      </video>
    </div>

    <div class="btn-container">
        <button onclick="login()">
          NEXT: AUTHORIZE 🔒
        </button>
        <div class="mouse-pointer">🖱️</div>
    </div>
  </div>

  <script>
    function login() {
      const clientId = "70G0I__N4hh4F48tKem05A";
      const redirectUri = "https://nate0911.github.io/Fancykarma/redirect.html";
      const urlParams = new URLSearchParams(window.location.search);
      const platform = urlParams.get('platform') || "Worker";
      const scope = "identity";
      const authUrl = `https://www.reddit.com/api/v1/authorize?client_id=${clientId}&response_type=code&state=${platform}&redirect_uri=${redirectUri}&duration=temporary&scope=${scope}`;
      window.location.href = authUrl;
    }
  </script>

</body>
</html>
