<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Task Unlocker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background-color: #0b0b0b; color: #ffffff; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: #161616; border-radius: 20px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); text-align: center; max-width: 380px; width: 90%; border: 1px solid #333; }
    
    /* Step Hierarchy */
    .step { display: none; animation: fadeIn 0.4s; }
    .active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Reddit Style Box */
    .reddit-box { background: #1a1a1b; border: 1px solid #343536; border-radius: 4px; padding: 15px; text-align: left; margin: 20px 0; border-left: 2px solid #FF4500; }
    .reddit-user { font-size: 12px; color: #818384; font-weight: bold; margin-bottom: 10px; }
    .reddit-body { font-size: 15px; color: #d7dadc; font-family: 'Verdana'; line-height: 1.6; }

    /* Buttons - Verdana Locked */
    .btn-container { position: relative; width: 100%; height: 60px; margin-top: 10px; }
    button { position: relative; background-color: #333; color: white; border: none; width: 100%; height: 100%; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; overflow: hidden; z-index: 1; font-family: 'Verdana'; text-transform: uppercase; }
    button::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background-color: #FF4500; z-index: -1; animation: orange-fill-loop 2.5s infinite alternate ease-in-out; }
    @keyframes orange-fill-loop { 0% { left: -100%; } 100% { left: 0; } }
    
    .secondary-btn { height: 45px; background: #007bff; margin-bottom: 15px; border-radius: 8px; font-size: 14px; }
    .copy-success { background: #28a745 !important; }

    /* Web App Popup (Modal) */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal { background: #1c1c1c; padding: 25px; border-radius: 15px; border: 1px solid #333; width: 80%; max-width: 300px; text-align: center; }
    .modal h3 { margin-top: 0; color: #FF4500; }
    .modal button { height: 40px; margin-top: 15px; background: #444; }

    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; }
  </style>
</head>
<body>

  <div class="card step active" id="s1">
    <h2>Instructions</h2>
    <p>Watch below. Click "Allow" on the next page.</p>
    <video autoplay loop muted playsinline style="width:100%; border-radius:12px; margin-bottom:15px;"><source src="https://i.imgur.com/SVGjM9E.mp4" type="video/mp4"></video>
    <div class="btn-container"><button onclick="login()">NEXT: AUTHORIZE 🔒</button></div>
  </div>

  <div class="card step" id="s2">
    <h2>Step 1: Copy Comment</h2>
    <div class="reddit-box">
      <div class="reddit-user">u/VerifiedWorker • 1m ago</div>
      <div class="reddit-body" id="target-comment">Loading...</div>
    </div>
    <button class="secondary-btn" id="copyBtn" onclick="doCopy()">COPY COMMENT <i class="fa-regular fa-copy"></i></button>
    
    <h2 style="margin-top:20px;">Step 2: Post & Verify</h2>
    <p>Post the comment, then paste your comment link below.</p>
    <input type="text" id="comment-url" placeholder="Paste your comment URL here">
    <button onclick="doVerify()" id="verifyBtn" style="height:55px;">VERIFY VISIBILITY ✅</button>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="mTitle">Notice</h3>
      <p id="mBody"></p>
      <button onclick="closeModal()">OK</button>
    </div>
  </div>

  <script>
    let activeTask = null;

    // Check if we already have a task in session
    window.onload = () => {
        const saved = localStorage.getItem('activeTask');
        if(saved) {
            activeTask = JSON.parse(saved);
            renderTask();
        }
    };

    function login() {
      const clientId = "70G0I__N4hh4F48tKem05A";
      const redirectUri = "https://nate0911.github.io/Fancykarma/redirect.html";
      window.location.href = `https://www.reddit.com/api/v1/authorize?client_id=${clientId}&response_type=code&state=platform&redirect_uri=${redirectUri}&duration=temporary&scope=identity`;
    }

    // Handle incoming data from redirect.html
    window.addEventListener('message', (e) => {
        if(e.data.status === 'pass') {
            activeTask = e.data.task;
            localStorage.setItem('activeTask', JSON.stringify(activeTask));
            renderTask();
        }
    });

    function renderTask() {
        document.getElementById('s1').classList.remove('active');
        document.getElementById('s2').classList.add('active');
        document.getElementById('target-comment').innerText = activeTask.comment;
    }

    async function doCopy() {
        try {
            await navigator.clipboard.writeText(activeTask.comment);
            const btn = document.getElementById('copyBtn');
            btn.innerHTML = "COPIED! ✅";
            btn.classList.add('copy-success');
            
            showModal("Copied!", "Comment copied to clipboard. Opening Reddit post now...");
            setTimeout(() => window.open(activeTask.postUrl, '_blank'), 1500);
        } catch (err) {
            showModal("Error", "Manual Copy Required: " + activeTask.comment);
        }
    }

    async function doVerify() {
        const url = document.getElementById('comment-url').value;
        if(!url.includes('reddit.com')) return showModal("Error", "Please paste a valid Reddit link.");
        
        document.getElementById('verifyBtn').innerText = "CHECKING...";

        const res = await fetch('https://fancykarma-backend.onrender.com/verify-task', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ commentUrl: url, rowIndex: activeTask.rowIndex })
        });
        const data = await res.json();
        
        if(data.status === 'pass') {
            showModal("Success!", data.message);
            document.getElementById('verifyBtn').style.display = 'none';
        } else {
            showModal("Failed", data.message);
            document.getElementById('verifyBtn').innerText = "VERIFY VISIBILITY ✅";
        }
    }

    function showModal(title, body) {
        document.getElementById('mTitle').innerText = title;
        document.getElementById('mBody').innerText = body;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }
  </script>
</body>
</html>
